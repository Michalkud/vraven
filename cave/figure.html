<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vrastislav Vender</title>
<style>
  /* ============================================================
     VRASTISLAV VENDER — "The Figure"
     A near-black cave. A volumetric shaft of neutral-white light
     pours down from a small opening high above, fanning outward
     and settling into a glowing pool on the floor. A small VRAVEN
     stands in that pool, dwarfed by the beam.
     All motion is opacity / transform / filter only. No assets.
     ============================================================ */

  :root{
    /* Timing baton for the reveal sequence (seconds). */
    --t-break:   0.6s;   /* light begins to break in   */
    --t-text:    3.0s;   /* VRAVEN ignites             */
    --t-pool:    3.3s;   /* pool settles               */
    --t-contact: 4.5s;   /* contact fades in last      */
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:#040405;
    color:#e9e9ec;
    font-family:"Helvetica Neue", Helvetica, Arial, "Segoe UI", system-ui, sans-serif;
    overflow:hidden;
    min-height:100vh;
    min-height:100svh;
  }

  /* The stage holds everything, clips the beam, and is the click target. */
  .stage{
    position:fixed;
    inset:0;
    overflow:hidden;
    cursor:pointer;
    /* Cave base: deep, faintly cool near-black, a touch of glow up top. */
    background:
      radial-gradient(120% 90% at 50% 0%,
        #15161a 0%, #0a0a0c 38%, #050506 70%, #020203 100%);
  }

  /* ---- THE OPENING : small bright mouth high up --------------- */
  .opening{
    position:absolute;
    top:-2vh;
    left:50%;
    transform:translateX(-50%);
    width:clamp(70px, 9vw, 140px);
    height:clamp(26px, 3.4vh, 46px);
    border-radius:50%;
    background:
      radial-gradient(60% 60% at 50% 55%,
        #ffffff 0%, #f3f4f8 35%, rgba(220,224,235,.55) 60%, rgba(120,124,135,0) 100%);
    filter:blur(6px);
    mix-blend-mode:screen;
    opacity:0;
    z-index:5;
  }

  /* ---- THE SHAFT : trapezoid cone of light ------------------- */
  /* Wrapper anchored at the opening; clipped to a narrow-to-wide cone. */
  .shaft{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:140%;
    height:100%;
    pointer-events:none;
    mix-blend-mode:screen;
    -webkit-clip-path:polygon(46% 0%, 54% 0%, 88% 100%, 12% 100%);
            clip-path:polygon(46% 0%, 54% 0%, 88% 100%, 12% 100%);
    z-index:3;
  }

  /* Soft outer body of the beam — the volumetric haze. */
  .shaft .haze{
    position:absolute; inset:0;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,.55) 0%,
        rgba(238,240,247,.30) 28%,
        rgba(210,214,226,.16) 60%,
        rgba(170,176,190,.06) 88%,
        rgba(140,146,160,0)  100%);
    filter:blur(22px);
    opacity:0;
  }

  /* Hot bright core — a narrower inner cone for intensity. */
  .shaft .core{
    position:absolute;
    top:0; left:50%;
    width:60%; height:100%;
    transform:translateX(-50%);
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.62) 24%,
        rgba(244,246,252,.30) 58%,
        rgba(220,224,235,.10) 86%,
        rgba(200,205,220,0)  100%);
    filter:blur(10px);
    opacity:0;
  }

  /* God-ray striations: thin angled slivers, very subtle. */
  .shaft .rays{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(95deg,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 14px,
        rgba(255,255,255,.05) 22px,
        rgba(255,255,255,0) 34px),
      repeating-linear-gradient(85deg,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 18px,
        rgba(255,255,255,.04) 27px,
        rgba(255,255,255,0) 40px);
    filter:blur(2px);
    opacity:0;
  }

  /* Unclipped, heavily blurred halo BEHIND the clipped cone.
     clip-path crops the shaft with razor-sharp edges; this soft
     column feathers those edges so the beam reads as gentle haze
     fanning out, not a hard-edged wedge. */
  .halo{
    position:absolute;
    top:-4%;
    left:50%;
    transform:translateX(-50%);
    width:46%;
    height:104%;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:0;
    z-index:2;
    /* Cone-ish soft column: bright/narrow up top, faint/wide low down. */
    background:
      radial-gradient(58% 116% at 50% -8%,
        rgba(255,255,255,.40) 0%,
        rgba(224,228,240,.18) 34%,
        rgba(180,186,200,.07) 62%,
        rgba(150,156,170,0)  82%);
    filter:blur(48px);
  }

  /* ---- THE POOL : glow on the cave floor --------------------- */
  .pool{
    position:absolute;
    bottom:8%;
    left:50%;
    transform:translate(-50%, 0) scale(.6);
    width:min(78vw, 720px);
    height:min(40vh, 320px);
    background:
      radial-gradient(50% 50% at 50% 50%,
        rgba(255,255,255,.55) 0%,
        rgba(232,236,246,.28) 30%,
        rgba(190,196,210,.10) 58%,
        rgba(150,156,170,0)  78%);
    filter:blur(26px);
    mix-blend-mode:screen;
    opacity:0;
    z-index:2;
  }

  /* ---- CAVE VIGNETTE : dark, rough frame --------------------- */
  .vignette{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:8;
    background:
      radial-gradient(120% 78% at 50% 42%,
        rgba(0,0,0,0) 38%,
        rgba(0,0,0,.45) 64%,
        rgba(0,0,0,.82) 84%,
        rgba(2,2,3,.96) 100%),
      /* darkness hugging the side walls of the cave */
      linear-gradient(to right,
        rgba(0,0,0,.7), rgba(0,0,0,0) 22%, rgba(0,0,0,0) 78%, rgba(0,0,0,.7)),
      linear-gradient(to bottom,
        rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 26%, rgba(0,0,0,0) 70%, rgba(0,0,0,.6) 100%);
  }

  /* ---- THE FIGURE / TEXT — small, at the base of the shaft ---- */
  .figure{
    position:absolute;
    left:50%;
    bottom:11%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
    width:min(92vw, 760px);
    padding:0 12px;
  }

  /* Standalone VRAVEN — small, intimate, all six letters lit. */
  .vraven{
    font-weight:700;
    font-size:clamp(2.1rem, 8vw, 4.4rem);
    letter-spacing:.16em;
    margin-right:-.16em;        /* offset trailing letter-spacing for centering */
    line-height:1;
    color:#fbfcff;
    opacity:0;
    transform:translateY(10px);
    text-shadow:
      0 0 8px  rgba(255,255,255,.55),
      0 0 26px rgba(228,232,244,.40),
      0 0 60px rgba(200,208,226,.25);
  }

  /* Full-name caption — tiny + dim, so concept + name stay recoverable. */
  .fullname{
    margin-top:clamp(.7rem, 2vh, 1.1rem);
    font-weight:400;
    font-size:clamp(.62rem, 2vw, .92rem);
    letter-spacing:.42em;
    margin-right:-.42em;
    line-height:1.5;
    color:#54565e;              /* dim shadow tone for the non-VRAVEN letters */
    opacity:0;
    transform:translateY(6px);
  }
  /* Keep each word's letters together so VRA / VEN never break apart.
     The caption itself may wrap BETWEEN the two words on narrow
     phones, but never inside a word — so the VRA/VEN reading holds. */
  .fullname .word{ display:inline-block; white-space:nowrap; }
  .fullname .word + .word{ margin-left:.7em; }
  /* The VRA / VEN initials a touch brighter inside the caption. */
  .fullname .lit{ color:#b8bac4; }

  /* ---- CONTACT — at the very bottom, fades in last ----------- */
  .contact{
    position:absolute;
    left:50%;
    bottom:3.4%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:clamp(.6rem, 4vw, 2rem);
    align-items:center;
    font-size:clamp(.62rem, 1.7vw, .8rem);
    letter-spacing:.14em;
    opacity:0;
    max-width:94vw;
  }
  .contact a{
    color:#7d808a;
    text-decoration:none;
    white-space:nowrap;
    transition:color .35s ease, text-shadow .35s ease;
  }
  .contact a:hover, .contact a:focus-visible{
    color:#eef0f6;
    text-shadow:0 0 14px rgba(220,226,240,.5);
    outline:none;
  }
  .contact .dot{ color:#3a3b42; }

  /* ---- REPLAY CONTROL --------------------------------------- */
  .replay{
    position:absolute;
    top:14px; right:16px;
    z-index:12;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.14);
    color:#9a9ca6;
    font:inherit;
    font-size:.66rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    padding:.5em .95em;
    border-radius:999px;
    cursor:pointer;
    opacity:0;
    transition:opacity .5s ease, color .3s ease, border-color .3s ease, background .3s ease;
  }
  .replay:hover, .replay:focus-visible{
    color:#f2f3f7;
    border-color:rgba(255,255,255,.4);
    background:rgba(255,255,255,.08);
    outline:none;
  }

  /* ============================================================
     PLAY STATE — adding .play to .stage runs the sequence.
     Each layer animates along the shared timing baton.
     ============================================================ */
  .stage.play .opening{
    animation:openIn 1.4s var(--ease) var(--t-break) forwards;
  }
  .stage.play .halo{
    animation:fade 2.4s var(--ease) var(--t-break) forwards; --to:.85;
  }
  .stage.play .haze{
    animation:fade 2.3s var(--ease) var(--t-break) forwards; --to:.9;
  }
  .stage.play .core{
    animation:fade 2.1s var(--ease) calc(var(--t-break) + .25s) forwards; --to:1;
  }
  .stage.play .rays{
    animation:rayIn 2.6s var(--ease) calc(var(--t-break) + .4s) forwards;
  }
  .stage.play .pool{
    animation:poolIn 1.9s var(--ease) var(--t-pool) forwards;
  }
  .stage.play .vraven{
    animation:igniteBig 1.5s var(--ease) var(--t-text) forwards;
  }
  .stage.play .fullname{
    animation:igniteSmall 1.4s var(--ease) calc(var(--t-text) + .35s) forwards;
  }
  .stage.play .contact{
    animation:fade 1.4s ease var(--t-contact) forwards; --to:1;
  }
  .stage.play .replay{
    animation:fade 1.4s ease calc(var(--t-contact) + .3s) forwards; --to:1;
  }
  /* Gentle living shimmer on the beam once it has settled. */
  .stage.play .shaft{
    animation:breathe 7s ease-in-out 5s infinite;
  }

  @keyframes openIn{
    from{ opacity:0; filter:blur(14px); }
    to{   opacity:1; filter:blur(6px); }
  }
  @keyframes fade{ to{ opacity:var(--to,1); } }
  @keyframes rayIn{ from{ opacity:0; } to{ opacity:.7; } }
  @keyframes poolIn{
    from{ opacity:0; transform:translate(-50%,0) scale(.6); }
    to{   opacity:1; transform:translate(-50%,0) scale(1); }
  }
  @keyframes igniteBig{
    from{ opacity:0; transform:translateY(10px); filter:brightness(.4); }
    60% { opacity:1; filter:brightness(1.5); }
    to  { opacity:1; transform:translateY(0);  filter:brightness(1); }
  }
  @keyframes igniteSmall{
    from{ opacity:0; transform:translateY(6px); }
    to  { opacity:1; transform:translateY(0); }
  }
  @keyframes breathe{
    0%,100%{ opacity:1; }
    50%    { opacity:.93; }
  }

  /* ============================================================
     REDUCED MOTION — show the final resting state, no animation.
     ============================================================ */
  @media (prefers-reduced-motion: reduce){
    .stage *{ animation:none !important; transition:none !important; }
    .opening{ opacity:1; }
    .halo{ opacity:.85; }
    .haze{ opacity:.9; }
    .core{ opacity:1; }
    .rays{ opacity:.7; }
    .pool{ opacity:1; transform:translate(-50%,0) scale(1); }
    .vraven{ opacity:1; transform:none; }
    .fullname{ opacity:1; transform:none; }
    .contact{ opacity:1; }
    .replay{ opacity:0; }      /* replay is a no-op here, so hide it */
    .stage{ cursor:default; }
  }
</style>
</head>
<body>
  <!-- The whole scene is one clickable stage; click/tap replays. -->
  <main class="stage" id="stage"
        aria-label="Vrastislav Vender. A shaft of light pours into a dark cave and reveals VRAVEN, the lit initials of his name.">

    <!-- Light layers (decorative). -->
    <div class="opening" aria-hidden="true"></div>
    <div class="halo" aria-hidden="true"></div>
    <div class="shaft" aria-hidden="true">
      <div class="haze"></div>
      <div class="core"></div>
      <div class="rays"></div>
    </div>
    <div class="pool" aria-hidden="true"></div>

    <!-- The figure: a small VRAVEN standing in the pool of light. -->
    <div class="figure">
      <!-- Standalone hero word — all six letters lit. -->
      <div class="vraven" aria-hidden="true">VRAVEN</div>

      <!-- Full name caption: real, selectable text. The VRA / VEN
           initials are brighter; the remaining letters stay dim.
           aria-label carries the plain, recoverable full name. -->
      <p class="fullname" aria-label="Vrastislav Vender">
        <span class="word"><span class="lit">VRA</span>STISLAV</span>
        <span class="word"><span class="lit">VEN</span>DER</span>
      </p>
    </div>

    <!-- Contact — fades in last. -->
    <nav class="contact" aria-label="Contact">
      <a href="mailto:hello@vraven.com">hello@vraven.com</a>
      <span class="dot" aria-hidden="true">/</span>
      <a href="tel:+420123456789">+420&nbsp;123&nbsp;456&nbsp;789</a>
    </nav>

    <!-- Cave vignette: above the light, below the text. -->
    <div class="vignette" aria-hidden="true"></div>

    <!-- Replay control. -->
    <button class="replay" id="replay" type="button" aria-label="Replay the light reveal">Replay</button>
  </main>

  <script>
    /* Minimal controller: toggle .play to (re)run the CSS-driven
       reveal. No rAF animation loop — all timing lives in CSS. */
    (function(){
      var stage  = document.getElementById('stage');
      var replay = document.getElementById('replay');

      var reduce = window.matchMedia &&
                   window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Restart the reveal by removing then re-adding the class.
      function play(){
        if(reduce) return;                 // resting state already shown
        stage.classList.remove('play');
        void stage.offsetWidth;            // force reflow so it restarts
        stage.classList.add('play');
      }

      // Kick off after a brief hold on black (two frames in).
      if(!reduce){
        requestAnimationFrame(function(){ requestAnimationFrame(play); });
      }

      // Replay on stage click/tap, ignoring clicks on links/buttons.
      stage.addEventListener('click', function(e){
        if(e.target.closest('a, button')) return;
        play();
      });

      // Dedicated replay button.
      replay.addEventListener('click', function(e){
        e.stopPropagation();
        play();
      });

      // Keyboard: Enter / Space on the focused replay button already
      // fires its click. This handler lets Enter/Space replay when
      // focus is elsewhere on the (focusable) stage too.
      stage.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){
          if(e.target.closest('a, button')) return;
          e.preventDefault();
          play();
        }
      });
    })();
  </script>
</body>
</html>
