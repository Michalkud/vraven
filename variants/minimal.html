<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vrastislav Vender</title>
<style>
  /* ============================================================
     PURE BEAM — ultra-minimal cinematic reveal.
     True black. ONE perfectly soft single beam. Impeccable type.
     Almost no motion beyond the beam sweep and the gentle ignition
     of VRAVEN. Gallery-quiet, timeless, understated.

     Lit letters spell VRAVEN:
       VRASTISLAV -> first 3 (V,R,A) ignite; S,T,I,S,L,A,V stay dim
       VENDER     -> first 3 (V,E,N) ignite; D,E,R stay dim

     All animation is opacity / transform / filter / color only
     (cheap to composite). One rAF canvas for the few dust motes.
     ============================================================ */

  :root {
    --bg:   #000000;                    /* true black */
    --dim:  rgba(247, 243, 234, 0.17);  /* faint letters resting in shadow */
    --lit:  #fbf4e6;                     /* warm illuminated letters */
    --glow: 247, 226, 173;               /* warm bloom (rgb triplet) */
    --beam: 255, 247, 228;               /* beam light (rgb triplet) */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; background: var(--bg); }

  body {
    /* refined system font stack only — zero external font requests */
    font-family: "Helvetica Neue", Helvetica, Arial,
                 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--lit);
    overflow: hidden;
    display: grid;
    place-items: center;
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    cursor: pointer;                    /* whole stage replays on click/tap */
  }

  /* ---------- the single soft beam ----------
     A wide, very soft cone of light descending from above, sitting
     behind the type. Pure radial gradient, GPU-composited. No god-rays,
     no turbulence — restraint is the whole point. The radial stop is
     kept tight enough that the soft edge fades fully before the
     viewport sides, so there is no mirrored halo on the far edges. */
  .beam {
    position: fixed;
    top: -34vh;
    left: 50%;
    width: 118vmin;
    height: 168vh;
    transform: translateX(-50%) translateY(-14%) scaleY(0.92);
    background:
      radial-gradient(46% 56% at 50% 12%,
        rgba(var(--beam), 0.20) 0%,
        rgba(var(--beam), 0.082) 28%,
        rgba(var(--beam), 0.022) 50%,
        transparent 66%);
    filter: blur(18px);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    will-change: opacity, transform;
  }

  /* faint pool where the beam lands — anchors the type to a "floor" */
  .pool {
    position: fixed;
    bottom: 4vh;
    left: 50%;
    width: 60vmin;
    height: 22vmin;
    transform: translateX(-50%);
    background: radial-gradient(50% 50% at 50% 50%,
      rgba(var(--beam), 0.055) 0%, transparent 68%);
    filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    will-change: opacity;
  }

  /* dust canvas — a handful of slow motes in the shaft, nothing more */
  #dust {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    will-change: opacity;
  }

  /* ---------- the name ---------- */
  .stage {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1120px;
    padding: 6vmin;
    text-align: center;
  }

  .name {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: baseline;
    gap: clamp(0.45rem, 5vw, 2rem);     /* gap between the two words */
    font-weight: 600;
    letter-spacing: clamp(0.015em, 0.6vw, 0.07em);
    font-size: clamp(2.1rem, 12vw, 8.6rem);
    line-height: 1.04;
  }

  /* each word stays intact so VRA / VEN reading order never breaks */
  .word { display: inline-flex; white-space: nowrap; }

  /* every letter is an independent light target.
     IMPORTANT: lit letters start DIM too — they only get their warm
     color + bloom under body.playing, so ignition is a real transition
     from dim -> lit (not "appear already bright"). */
  .ltr {
    display: inline-block;
    color: var(--dim);
    opacity: 0;                          /* hidden until the name appears */
    transform: translateY(0.1em);
    transition:
      opacity 1.1s ease,
      transform 1.1s cubic-bezier(.2,.7,.2,1);
    will-change: opacity, transform, color, text-shadow;
  }

  /* ---------- contact ---------- */
  .contact {
    margin-top: clamp(1.6rem, 6vh, 3.4rem);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: clamp(0.7rem, 4vw, 2.2rem);
    font-size: clamp(0.72rem, 2.1vw, 0.92rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .contact a {
    color: rgba(250, 244, 230, 0.62);
    text-decoration: none;
    border-bottom: 1px solid rgba(250, 244, 230, 0.12);
    padding-bottom: 0.2em;
    transition: color .4s ease, border-color .4s ease;
  }
  .contact a:hover,
  .contact a:focus-visible {
    color: var(--lit);
    border-color: rgba(var(--glow), 0.5);
    outline: none;
  }
  .contact .sep { color: rgba(250, 244, 230, 0.22); }

  /* ---------- subtle replay control ---------- */
  .replay {
    position: fixed;
    bottom: clamp(1rem, 3vh, 2rem);
    right: clamp(1rem, 3vw, 2rem);
    z-index: 3;
    background: none;
    border: none;
    color: rgba(250, 244, 230, 0.26);
    font: inherit;
    font-size: 0.68rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.4s ease, color .4s ease;
  }
  .replay:hover, .replay:focus-visible {
    color: rgba(250, 244, 230, 0.7);
    outline: none;
  }

  /* ================= CHOREOGRAPHY =================
     Two body classes drive everything: .playing then .revealed.
     Per-letter stagger comes from the CSS var --i set in JS. */

  /* 1. beam arrives from the dark */
  body.playing .beam {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scaleY(1);
    transition: opacity 1.7s ease 0.35s,
                transform 2.3s cubic-bezier(.16,.8,.24,1) 0.35s;
  }
  body.playing .pool {
    opacity: 1;
    transition: opacity 2s ease 1.15s;
  }
  body.playing #dust {
    opacity: 1;
    transition: opacity 3s ease 1.7s;
  }

  /* 2. the whole name faintly appears (dim), gently staggered */
  body.playing .ltr {
    opacity: 1;
    transform: translateY(0);
    transition-delay: calc(0.95s + var(--i) * 0.04s);
  }

  /* 3. VRAVEN IGNITES — warm color + soft bloom fade in AFTER the dim
        appearance, so the six clearly catch light while the rest stay
        in shadow. This is a true color/shadow value change => it
        animates from dim -> lit. */
  body.playing .ltr.lit {
    color: var(--lit);
    text-shadow:
      0 0 0.02em rgba(var(--glow), 0.9),
      0 0 0.34em rgba(var(--glow), 0.55),
      0 0 1.05em rgba(var(--glow), 0.3),
      0 0 2.3em  rgba(var(--glow), 0.15);
    transition:
      opacity 1.1s ease calc(0.95s + var(--i) * 0.04s),
      transform 1.1s cubic-bezier(.2,.7,.2,1) calc(0.95s + var(--i) * 0.04s),
      color 1.2s ease calc(1.95s + var(--i) * 0.06s),
      text-shadow 1.6s ease calc(1.95s + var(--i) * 0.06s);
  }

  /* 4. contact + replay fade in last */
  body.revealed .contact,
  body.revealed .replay { opacity: 1; }

  /* ================= REDUCED MOTION =================
     Render the final resting state immediately, no transitions.
     showFinalState() adds .playing + .revealed, so the lit rule applies
     and these overrides snap it into place. */
  @media (prefers-reduced-motion: reduce) {
    .beam, .pool, #dust, .ltr, .ltr.lit, .contact, .replay {
      transition: none !important;
    }
    .beam, .pool {
      opacity: 1 !important;
      transform: translateX(-50%) !important;
    }
    #dust { opacity: 1 !important; }
    .ltr { opacity: 1 !important; transform: none !important; }
    .contact, .replay { opacity: 1 !important; }
  }

  @media (max-height: 430px) { .contact { margin-top: 1rem; } }
</style>
</head>
<body>

  <!-- soft light layers (decorative, hidden from a11y tree) -->
  <div class="beam" aria-hidden="true"></div>
  <div class="pool" aria-hidden="true"></div>
  <canvas id="dust" aria-hidden="true"></canvas>

  <main class="stage">
    <!-- Full name as real, selectable text. aria-label gives screen
         readers the clean full name regardless of per-letter spans. -->
    <h1 class="name" aria-label="Vrastislav Vender">
      <!-- words wrapped so letter groups never break across lines -->
      <span class="word" data-word="VRASTISLAV"></span>
      <span class="word" data-word="VENDER"></span>
    </h1>

    <!-- contact, revealed last -->
    <p class="contact">
      <a href="mailto:hello@vraven.com">hello@vraven.com</a>
      <span class="sep" aria-hidden="true">&middot;</span>
      <a href="tel:+420123456789">+420&nbsp;123&nbsp;456&nbsp;789</a>
    </p>
  </main>

  <button class="replay" type="button" aria-label="Replay animation">Replay</button>

<script>
(function () {
  "use strict";

  /* ---------------------------------------------------------------
     Build the name letter by letter. The first three letters of each
     word are lit (VRA + VEN = VRAVEN); the rest stay dim.
     --------------------------------------------------------------- */
  var LIT_COUNT = 3;                       // first 3 letters of each word ignite
  var words = document.querySelectorAll(".word");
  var i = 0;                               // global stagger index

  words.forEach(function (wordEl) {
    var text = wordEl.getAttribute("data-word");
    for (var j = 0; j < text.length; j++) {
      var span = document.createElement("span");
      span.className = "ltr" + (j < LIT_COUNT ? " lit" : "");
      span.textContent = text[j];
      span.style.setProperty("--i", i++);            // drives transition-delay
      span.setAttribute("aria-hidden", "true");      // h1 aria-label has full name
      wordEl.appendChild(span);
    }
  });

  /* ---------------------------------------------------------------
     Reduced motion: skip the show, render the resting state.
     --------------------------------------------------------------- */
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var body = document.body;
  var revealTimer = null;

  function play() {
    body.classList.remove("playing", "revealed");
    if (revealTimer) clearTimeout(revealTimer);
    void body.offsetWidth;               // force reflow so transitions restart
    body.classList.add("playing");
    // contact + replay appear once the ignition has settled
    revealTimer = setTimeout(function () { body.classList.add("revealed"); }, 3500);
  }

  function showFinalState() { body.classList.add("playing", "revealed"); }

  if (reduceMotion) {
    showFinalState();
  } else {
    setTimeout(play, 450);               // brief hold on black before the beam
  }

  /* ---------------------------------------------------------------
     Replay: the control, or a click/tap anywhere (links excepted).
     --------------------------------------------------------------- */
  document.addEventListener("click", function (e) {
    if (e.target.closest("a")) return;                 // let contact links work
    if (window.getSelection().toString()) return;      // don't fight selection
    if (reduceMotion) return;                          // honor reduced motion
    play();
  });
  document.querySelector(".replay").addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); play(); }
  });

  /* ---------------------------------------------------------------
     Dust — a few slow motes drifting in the beam. The only canvas
     animation: rAF, alpha-only draws. Skipped under reduced motion.
     --------------------------------------------------------------- */
  var canvas = document.getElementById("dust");
  var ctx = canvas.getContext("2d");
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var motes = [];
  var W = 0, H = 0;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    seed();
  }

  function seed() {
    // deliberately sparse for the gallery-quiet feel
    var count = Math.round(Math.min(26, Math.max(12, (W * H) / 70000)));
    motes = [];
    for (var k = 0; k < count; k++) {
      motes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.0 + 0.3,
        a: Math.random() * 0.3 + 0.05,
        vy: -(Math.random() * 0.1 + 0.025),       // gentle upward drift
        vx: (Math.random() - 0.5) * 0.05,
        tw: Math.random() * Math.PI * 2           // twinkle phase
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    var cx = W / 2;
    for (var k = 0; k < motes.length; k++) {
      var m = motes[k];
      m.y += m.vy; m.x += m.vx; m.tw += 0.009;
      if (m.y < -4) { m.y = H + 4; m.x = Math.random() * W; }
      // fade motes by horizontal distance from the beam centre
      var falloff = Math.max(0, 1 - Math.abs(m.x - cx) / (W * 0.5));
      var alpha = m.a * falloff * (0.6 + 0.4 * Math.sin(m.tw));
      if (alpha <= 0.01) continue;
      ctx.beginPath();
      ctx.fillStyle = "rgba(255, 247, 228," + alpha.toFixed(3) + ")";
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fill();
    }
    raf = requestAnimationFrame(tick);
  }

  var raf = null;
  resize();
  window.addEventListener("resize", resize, { passive: true });
  if (!reduceMotion) raf = requestAnimationFrame(tick);
  // under reduced motion we leave the canvas blank (no distracting motion)
})();
</script>
</body>
</html>
