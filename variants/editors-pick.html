<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vrastislav Vender</title>
<meta name="description" content="Vrastislav Vender — a name brought into the light. Vra·Ven." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23090707'/%3E%3Ccircle cx='46' cy='18' r='15' fill='%23ffd9a0'/%3E%3Ccircle cx='46' cy='18' r='7' fill='%23fff3de'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     VRASTISLAV VENDER — editor's pick, rebuilt
     A warm volumetric beam enters from just off the upper-right
     corner and rakes down-left across the stage. The name is mixed
     case now — "Vrastislav" stacked over "Vender", set in Fraunces
     at display optical size so the thick/thin contrast catches the
     raking light. The beam's hot spot SETTLES ON THE FIRST THREE
     LETTERS of each word, so the lit column reads VRA over VEN —
     Vraven — while the tails (…stislav / …der) fall away into
     shadow.
     Each word is three perfectly-registered layers of the same
     text: a DIM base (the name is always present in the dark), a
     warm gradient-clipped LIT copy, and a blurred GLOW. The lit and
     glow copies are clipped by a soft mask "hot spot" that slides
     in from the right — the spotlight crosses the word and comes to
     rest on the leading letters, with real falloff into the tail.
     The beam itself is a true conic-gradient cone anchored at the
     source (it widens with distance), layered with ray streaks, a
     corner source-bloom, haze, a landing pool, drifting dust and
     film grain. The resting scene is plain CSS; one `.revealed`
     class stages the whole choreography via transition-delays
     (transitions live ONLY under `.revealed`, so removing the class
     resets instantly for replay). Reduced motion shows the final
     still frame.
     ============================================================ */

  :root {
    --beam: 255, 226, 184;            /* warm beam tint (rgb triplet) */
    --hot: 255, 246, 230;             /* hottest core tint */
    /* Light source: just off the upper-right corner. */
    --src-x: 99%;
    --src-y: -9%;
    --beam-angle: 65deg;              /* tilt of the beam from vertical */
    /* Where the light lands — the centre of the Vra/Ven column. */
    --land-x: 24%;
    --land-y: 47%;
    /* Left margin the whole composition hangs from. */
    --edge: clamp(2rem, 10vw, 13rem);
    /* Choreography */
    --t-ig1: 1.9s;                    /* hot spot reaches "Vrastislav" */
    --t-ig2: 2.25s;                   /* …then "Vender" */
    --sweep-ease: cubic-bezier(.3, .5, .22, 1);
    /* The travelling hot spot: a soft band, feathered on both sides.
       At rest (--shift) the solid part sits over the first three
       letters and falls off across the fourth. Em-based, so it
       scales with the type. */
    --spot: linear-gradient(97deg,
              rgba(0,0,0,0)   0em,
              rgba(0,0,0,.55) 1.3em,
              #000            1.9em,
              #000            3.55em,
              rgba(0,0,0,.5)  3.8em,
              rgba(0,0,0,0)   4.25em);
    --travel: 5em;                    /* start: beyond the word's end */
    --shift: -2.1em;                  /* rest: solid zone from x=0 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background:
      radial-gradient(140% 120% at 86% -6%, #1a130b 0%, #0d0a08 40%, #070606 72%, #050404 100%);
    color: #efe7d8;
    overflow: hidden;
    font-family: "Fraunces", Georgia, "Times New Roman", serif;
    font-optical-sizing: auto;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Full-bleed stage. Click anywhere to replay. */
  .stage {
    position: fixed;
    inset: 0;
    cursor: pointer;
    isolation: isolate;               /* contain the screen blends */
    overflow: hidden;
  }

  /* ---- The cone — a true conic beam anchored at the source ----
     Centred exactly on the source point, so the lit sector widens
     with distance like a real shaft of light. Two conic layers:
     a thin hot core inside a wide feathered cone. The whole element
     pivots around the source as it settles into place. ----------*/
  .cone {
    position: absolute;
    left: var(--src-x);
    top: var(--src-y);
    width: 240vmax;
    height: 240vmax;
    transform: translate(-50%, -50%) rotate(-2.5deg);
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    z-index: 1;
    background:
      conic-gradient(from calc(180deg + var(--beam-angle) - 2.2deg) at 50% 50%,
        rgba(var(--hot), 0)    0deg,
        rgba(var(--hot), .30)  2.2deg,
        rgba(var(--hot), 0)    4.4deg,
        rgba(var(--hot), 0)    360deg),
      conic-gradient(from calc(180deg + var(--beam-angle) - 16deg) at 50% 50%,
        rgba(var(--beam), 0)    0deg,
        rgba(var(--beam), .04)  6deg,
        rgba(var(--beam), .12)  12deg,
        rgba(var(--beam), .25)  15.2deg,
        rgba(var(--beam), .29)  16deg,
        rgba(var(--beam), .25)  16.8deg,
        rgba(var(--beam), .12)  20.5deg,
        rgba(var(--beam), .04)  26deg,
        rgba(var(--beam), 0)    32deg,
        rgba(var(--beam), 0)    360deg);
  }

  /* ---- Soft ray streaks layered inside the cone for texture ---- */
  .rays {
    position: absolute;
    top: var(--src-y);
    left: var(--src-x);
    width: 52vmax;
    height: 190%;
    transform-origin: 50% 0%;
    transform: translateX(-50%) rotate(var(--beam-angle)) scaleY(.65);
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    z-index: 1;
  }
  .ray {
    position: absolute;
    top: 0;
    left: 50%;
    width: 22vmax;
    height: 100%;
    background: linear-gradient(to bottom,
      rgba(var(--beam), 0)   0%,
      rgba(var(--beam), .13) 30%,
      rgba(var(--beam), .04) 70%,
      rgba(var(--beam), 0)   100%);
    filter: blur(24px);
    transform-origin: 50% 0%;
  }
  .ray.r1 { transform: translateX(-50%) rotate(-6.5deg) scaleX(.5);  opacity: .8;  }
  .ray.r2 { transform: translateX(-50%) rotate(-2deg)   scaleX(.85); opacity: 1;   }
  .ray.r3 { transform: translateX(-50%) rotate(2.5deg)  scaleX(.62); opacity: .9;  }
  .ray.r4 { transform: translateX(-50%) rotate(7deg)    scaleX(.42); opacity: .75; }
  .ray.core {
    width: 10vmax;
    background: linear-gradient(to bottom,
      rgba(var(--hot), 0)   0%,
      rgba(var(--hot), .34) 26%,
      rgba(var(--hot), .10) 70%,
      rgba(var(--hot), 0)   100%);
    filter: blur(14px);
    transform: translateX(-50%) scaleX(.9);
  }

  /* ---- Atmosphere: haze along the beam's path ---- */
  .haze {
    position: absolute;
    inset: -10%;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    z-index: 1;
    background: radial-gradient(60% 50% at 58% 28%,
      rgba(var(--beam), .055) 0%,
      rgba(var(--beam), .02)  45%,
      rgba(var(--beam), 0)    70%);
  }

  /* ---- The pool of light where the beam lands on the column ---- */
  .pool {
    position: absolute;
    top: var(--land-y);
    left: var(--land-x);
    width: 66vmax;
    height: 52vmax;
    transform: translate(-50%, -50%) rotate(calc(var(--beam-angle) * .45));
    background: radial-gradient(ellipse 40% 36% at 50% 50%,
      rgba(var(--beam), .23) 0%,
      rgba(var(--beam), .07) 50%,
      rgba(var(--beam), 0)   74%);
    mix-blend-mode: screen;
    pointer-events: none;
    opacity: 0;
    z-index: 1;
  }

  /* ---- Drifting dust caught in the beam (populated by JS) ---- */
  .dust {
    position: absolute;
    inset: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    z-index: 2;
  }
  .mote {
    position: absolute;
    border-radius: 50%;
    background: rgba(var(--beam), .9);
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translate3d(0, 0, 0);                 opacity: 0;  }
    12%  {                                                   opacity: .75; }
    88%  {                                                   opacity: .45; }
    100% { transform: translate3d(var(--dx), var(--dy), 0); opacity: 0;  }
  }

  /* ---- The name ----------------------------------------------
     Two stacked words, flush left, so the lit prefixes form one
     column: Vra over Ven. Each word is three registered layers —
     dim base / masked lit gradient / masked glow — and the mask is
     the travelling hot spot that comes to rest on the prefix. ----*/
  .name-block {
    position: absolute;
    left: var(--edge);
    top: 48%;
    transform: translateY(-50%);
    z-index: 3;
  }

  .name { font-weight: 540; }

  .word-wrap {
    position: relative;
    display: block;
    font-size: clamp(2.6rem, 12vw, 11rem);
    line-height: 1.04;
    letter-spacing: -.01em;
    opacity: 0;
    transform: translateY(.14em);
  }
  .w { display: block; white-space: nowrap; }

  /* "Ven" is a touch wider than "Vra" — give the second word's spot
     a slightly smaller pull-back so the n stays fully in the light. */
  .word-wrap.w2 { --shift: -2em; }

  /* base — the full name resting in shadow, always recoverable */
  .w.base { color: #332d27; }

  /* lit + glow — warm copies clipped by the travelling hot spot */
  .w.lit,
  .w.glow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    user-select: none;
    -webkit-mask: var(--spot) var(--travel) 0 / 250% 100% no-repeat;
    mask: var(--spot) var(--travel) 0 / 250% 100% no-repeat;
    opacity: 0;
  }
  /* Lit from above: the gradient runs down the glyphs (hot caps,
     deeper baseline) with a slight right bias toward the source —
     the horizontal falloff across the word is the mask's job. */
  .w.lit {
    background: linear-gradient(192deg,
      #fff9ed 4%,
      #ffe7b8 32%,
      #eec487 58%,
      #c79c61 82%,
      #aa814f 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .w.glow {
    color: #ffd9a2;
    mix-blend-mode: screen;
    filter: blur(.2em) saturate(1.15);
  }

  /* tagline — arrives once the name is lit */
  .tagline {
    margin-top: clamp(1.1rem, 2.6vw, 2rem);
    margin-left: .14em;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(.92rem, 1.7vw, 1.18rem);
    letter-spacing: .04em;
    color: #93866f;
    opacity: 0;
    transform: translateY(10px);
  }

  /* ---- Vignette: darkness presses in around the light ---- */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    background: radial-gradient(ellipse 110% 96% at 30% 52%,
      rgba(4, 3, 3, 0)   30%,
      rgba(4, 3, 3, .42) 64%,
      rgba(3, 2, 2, .85) 100%);
  }

  /* ---- Source bloom: the opening the light pours through ---- */
  .srcbloom {
    position: absolute;
    left: var(--src-x);
    top: var(--src-y);
    width: 60vmax;
    height: 60vmax;
    transform: translate(-50%, -50%);
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 5;
    opacity: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(var(--hot), .9) 0%, rgba(var(--hot), 0) 7%),
      radial-gradient(circle at 50% 50%, rgba(var(--hot), .5) 0%, rgba(var(--beam), .16) 26%, rgba(var(--beam), 0) 58%);
  }

  /* ---- Contact — quiet, lowercase, arrives last ---- */
  .contact {
    position: absolute;
    left: var(--edge);
    bottom: clamp(1.8rem, 5.5vh, 3.6rem);
    z-index: 6;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: .4em clamp(1.1rem, 3vw, 2.2rem);
    font-size: clamp(.78rem, 1.6vw, .95rem);
    font-weight: 420;
    letter-spacing: .12em;
    opacity: 0;
    transform: translateY(8px);
  }
  .contact a {
    color: #9a8d78;
    text-decoration: none;
    white-space: nowrap;
    transition: color .35s ease, text-shadow .35s ease;
  }
  .contact a:hover,
  .contact a:focus-visible {
    color: #ffe9c4;
    text-shadow: 0 0 14px rgba(255, 224, 170, .55);
    outline: none;
  }
  .contact .sep { color: #46403a; }

  /* ---- Replay — a whisper in the lower-right corner ---- */
  .replay {
    position: absolute;
    right: clamp(1.4rem, 4vw, 2.6rem);
    bottom: clamp(1.7rem, 5.2vh, 3.4rem);
    z-index: 6;
    font-family: inherit;
    font-size: .72rem;
    font-weight: 420;
    letter-spacing: .22em;
    color: #756a59;
    background: none;
    border: 1px solid rgba(var(--beam), .14);
    border-radius: 999px;
    padding: .55em 1.25em .5em;
    cursor: pointer;
    opacity: 0;
    transition: color .35s ease, border-color .35s ease;
  }
  .replay:hover,
  .replay:focus-visible {
    color: #ffe9c4;
    border-color: rgba(var(--beam), .45);
    outline: none;
  }

  /* ---- Film grain ---- */
  .grain {
    position: fixed;
    inset: -60px;
    pointer-events: none;
    z-index: 7;
    opacity: .05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
    animation: grainShift 1.2s steps(1) infinite;
  }
  @keyframes grainShift {
    0%   { transform: translate(0, 0); }
    12%  { transform: translate(-28px, 14px); }
    25%  { transform: translate(16px, -24px); }
    37%  { transform: translate(-20px, -10px); }
    50%  { transform: translate(24px, 18px); }
    62%  { transform: translate(-30px, 4px); }
    75%  { transform: translate(10px, -18px); }
    87%  { transform: translate(-12px, 22px); }
    100% { transform: translate(0, 0); }
  }

  /* ============================================================
     CHOREOGRAPHY — all transitions live under .revealed, so
     removing the class snaps everything back instantly and a
     replay restages from true black.
       0.0s   the cone swings in, haze + source bloom breathe up
       0.55s  the dim name surfaces from the dark
       1.9s   the hot spot crosses "Vrastislav", settles on Vra
       2.25s  …and crosses "Vender", settling on Ven
       3.6s   tagline
       3.9s   contact · replay
     ============================================================ */
  .stage.revealed .cone {
    opacity: 1;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: opacity 1.9s ease, transform 2.4s cubic-bezier(.2, .7, .2, 1);
    animation: breathe 9s ease-in-out 5.4s infinite;
  }
  .stage.revealed .rays {
    opacity: 1;
    transform: translateX(-50%) rotate(var(--beam-angle)) scaleY(1);
    transition: opacity 1.7s ease .1s, transform 2.2s cubic-bezier(.2, .7, .2, 1);
  }
  .stage.revealed .haze     { opacity: 1; transition: opacity 2.4s ease .3s; }
  .stage.revealed .pool     { opacity: 1; transition: opacity 2s ease .5s; }
  .stage.revealed .srcbloom { opacity: 1; transition: opacity 2.2s ease; }
  .stage.revealed .dust     { opacity: 1; transition: opacity 2.4s ease .9s; }

  .stage.revealed .word-wrap {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 1.5s ease .55s, transform 1.9s cubic-bezier(.2, .7, .2, 1) .55s;
  }
  .stage.revealed .word-wrap.w2 {
    transition-delay: .68s;
  }

  .stage.revealed .w.lit,
  .stage.revealed .w.glow {
    -webkit-mask-position: var(--shift) 0;
    mask-position: var(--shift) 0;
  }
  .stage.revealed .w1 .w.lit {
    opacity: 1;
    transition: opacity .6s ease var(--t-ig1),
                -webkit-mask-position 1.7s var(--sweep-ease) var(--t-ig1),
                mask-position 1.7s var(--sweep-ease) var(--t-ig1);
    animation: emberPulse 7s ease-in-out 5.6s infinite;
  }
  .stage.revealed .w1 .w.glow {
    opacity: .5;
    transition: opacity 1.1s ease var(--t-ig1),
                -webkit-mask-position 1.7s var(--sweep-ease) var(--t-ig1),
                mask-position 1.7s var(--sweep-ease) var(--t-ig1);
  }
  .stage.revealed .w2 .w.lit {
    opacity: 1;
    transition: opacity .6s ease var(--t-ig2),
                -webkit-mask-position 1.7s var(--sweep-ease) var(--t-ig2),
                mask-position 1.7s var(--sweep-ease) var(--t-ig2);
    animation: emberPulse 7s ease-in-out 5.8s infinite;
  }
  .stage.revealed .w2 .w.glow {
    opacity: .5;
    transition: opacity 1.1s ease var(--t-ig2),
                -webkit-mask-position 1.7s var(--sweep-ease) var(--t-ig2),
                mask-position 1.7s var(--sweep-ease) var(--t-ig2);
  }

  .stage.revealed .tagline {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 1.4s ease 3.6s, transform 1.6s cubic-bezier(.2, .7, .2, 1) 3.6s;
  }
  .stage.revealed .contact {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 1.4s ease 3.9s, transform 1.5s ease 3.9s;
  }
  .stage.revealed .replay {
    opacity: 1;
    transition: opacity 1.4s ease 4.1s, color .35s ease, border-color .35s ease;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50%      { opacity: .86; }
  }
  @keyframes emberPulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.08); }
  }

  /* If masks aren't supported, fall back to a static lit prefix:
     the gradient itself fades out past the third letter. */
  @supports not (mask-size: 250% 100%) {
    .w.lit, .w.glow { -webkit-mask: none; mask: none; }
    .w.lit {
      background: linear-gradient(to right,
        #fff8e9 0em, #ffe3b0 .8em, #eec78b 1.6em,
        rgba(238, 199, 139, .45) 2.4em, rgba(238, 199, 139, 0) 3.4em);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .w.glow { display: none; }
  }

  /* ---- Mobile: gentler tilt so the beam still clearly enters from
     the upper-RIGHT on a tall, narrow viewport. ------------------*/
  @media (max-width: 560px) {
    :root {
      --src-x: 86%;
      --src-y: -5%;
      --beam-angle: 34deg;
      --land-x: 28%;
      --land-y: 45%;
      --edge: 1.6rem;
    }
    .word-wrap { font-size: clamp(2.6rem, 15.5vw, 5rem); }
    .tagline   { max-width: 24ch; }
    .replay    { bottom: auto; top: clamp(1.2rem, 4vh, 2rem); }
  }

  /* ---- Reduced motion: present the final still frame. ---- */
  @media (prefers-reduced-motion: reduce) {
    .stage.revealed .cone,
    .stage.revealed .rays,
    .stage.revealed .haze,
    .stage.revealed .pool,
    .stage.revealed .srcbloom,
    .stage.revealed .dust,
    .stage.revealed .word-wrap,
    .stage.revealed .w.lit,
    .stage.revealed .w.glow,
    .stage.revealed .tagline,
    .stage.revealed .contact,
    .stage.revealed .replay { transition: none !important; animation: none !important; }
    .mote  { animation: none !important; opacity: .45 !important; }
    .grain { animation: none !important; }
  }
</style>
<noscript>
<style>
  /* No JS: skip the choreography, show the finished scene. */
  .cone, .rays, .haze, .pool, .srcbloom, .word-wrap,
  .tagline, .contact { opacity: 1 !important; transform: none !important; }
  .cone     { transform: translate(-50%, -50%) !important; }
  .rays     { transform: translateX(-50%) rotate(var(--beam-angle)) !important; }
  .pool     { transform: translate(-50%, -50%) rotate(calc(var(--beam-angle) * .45)) !important; }
  .srcbloom { transform: translate(-50%, -50%) !important; }
  .name-block { transform: translateY(-50%) !important; }
  .w.lit  { opacity: 1 !important; -webkit-mask-position: var(--shift) 0 !important; mask-position: var(--shift) 0 !important; }
  .w.glow { opacity: .5 !important; -webkit-mask-position: var(--shift) 0 !important; mask-position: var(--shift) 0 !important; }
  .replay { display: none; }
</style>
</noscript>
</head>
<body>
  <main class="stage" id="stage">
    <!-- The light: true cone from the corner + ray streaks + haze -->
    <div class="cone" aria-hidden="true"></div>
    <div class="rays" aria-hidden="true">
      <span class="ray r1"></span>
      <span class="ray r2"></span>
      <span class="ray r3"></span>
      <span class="ray r4"></span>
      <span class="ray core"></span>
    </div>
    <div class="haze" aria-hidden="true"></div>
    <div class="pool" aria-hidden="true"></div>

    <!-- Dust motes drifting in the beam (populated by JS) -->
    <div class="dust" id="dust" aria-hidden="true"></div>

    <!-- The name. Real text lives in the base layers; the lit and
         glow copies are aria-hidden duplicates for the light, kept
         in perfect register because each layer is the full word. -->
    <div class="name-block">
      <h1 class="name">
        <span class="word-wrap w1">
          <span class="w base">Vrastislav</span>
          <span class="w glow" aria-hidden="true">Vrastislav</span>
          <span class="w lit" aria-hidden="true">Vrastislav</span>
        </span>
        <span class="word-wrap w2">
          <span class="w base">Vender</span>
          <span class="w glow" aria-hidden="true">Vender</span>
          <span class="w lit" aria-hidden="true">Vender</span>
        </span>
      </h1>
      <p class="tagline">Out of the dark, a name.</p>
    </div>

    <div class="vignette" aria-hidden="true"></div>
    <div class="srcbloom" aria-hidden="true"></div>

    <nav class="contact" aria-label="Contact">
      <a href="mailto:hello@vraven.com">hello@vraven.com</a>
      <span class="sep" aria-hidden="true">&middot;</span>

    <button class="replay" id="replay" type="button" aria-label="Replay animation">replay</button>
  </main>
  <div class="grain" aria-hidden="true"></div>

<script>
(function () {
  'use strict';

  /* --- Dust motes scattered ALONG the beam: t=0 at the source
         (upper-right), t≈1 at the landing pool on the name, with a
         little jitter, drifting slowly back up toward the source. */
  var dust = document.getElementById('dust');
  var css  = getComputedStyle(document.documentElement);
  var srcX  = parseFloat(css.getPropertyValue('--src-x'))  || 99;
  var srcY  = parseFloat(css.getPropertyValue('--src-y'))  || -9;
  var landX = parseFloat(css.getPropertyValue('--land-x')) || 24;
  var landY = parseFloat(css.getPropertyValue('--land-y')) || 47;
  var MOTES = 32;
  for (var i = 0; i < MOTES; i++) {
    var m = document.createElement('span');
    m.className = 'mote';
    var size = 0.8 + Math.random() * 2.4;
    var t = Math.random() * 1.3;                 /* a few drift past the name */
    var x = srcX + (landX - srcX) * t + (Math.random() - 0.5) * 22;
    var y = srcY + (landY - srcY) * t + (Math.random() - 0.5) * 12;
    m.style.width = m.style.height = size.toFixed(2) + 'px';
    m.style.left = x.toFixed(2) + '%';
    m.style.top  = y.toFixed(2) + '%';
    if (Math.random() < 0.4) m.style.filter = 'blur(1.4px)';   /* depth */
    m.style.setProperty('--dx', (12 + Math.random() * 46).toFixed(1) + 'px');
    m.style.setProperty('--dy', (-26 - Math.random() * 80).toFixed(1) + 'px');
    var dur = 9 + Math.random() * 13;
    m.style.animationDuration = dur.toFixed(1) + 's';
    m.style.animationDelay = (-Math.random() * dur).toFixed(1) + 's';
    m.style.opacity = (0.25 + Math.random() * 0.5).toFixed(2);
    dust.appendChild(m);
  }

  /* --- Reveal: one class drives the whole choreography. Because all
         transitions live under `.revealed`, removing the class snaps
         the scene back to black instantly — replays restage cleanly. */
  var stage = document.getElementById('stage');
  var mql   = window.matchMedia('(prefers-reduced-motion: reduce)');
  var revealTimer = null;

  function reveal() {
    stage.classList.remove('revealed');
    void stage.offsetWidth;                      /* commit the reset */
    if (mql.matches) {
      stage.classList.add('revealed');           /* straight to rest */
      return;
    }
    clearTimeout(revealTimer);
    revealTimer = setTimeout(function () {
      stage.classList.add('revealed');
    }, 650);                                     /* a beat of darkness */
  }

  stage.addEventListener('click', function (e) {
    if (e.target.closest('a') || e.target.closest('button')) return;
    var sel = window.getSelection();
    if (sel && sel.toString().length) return;    /* don't fight a selection */
    reveal();
  });
  document.getElementById('replay').addEventListener('click', function (e) {
    e.stopPropagation();
    reveal();
  });
  window.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      if (document.activeElement && document.activeElement.tagName === 'A') return;
      e.preventDefault();
      reveal();
    }
  });

  var onPref = function () { reveal(); };
  if (mql.addEventListener) mql.addEventListener('change', onPref);
  else if (mql.addListener) mql.addListener(onPref);

  reveal();
})();
</script>
</body>
