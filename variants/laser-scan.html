<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vrastislav Vender</title>
<style>
  /* ============================================================
     "LASER SCAN" — cold sci-fi precision.
     A razor-thin light LINE sweeps the void left-to-right and
     ignites the six letters spelling VRAVEN as it crosses them:
        VRA (from VRASTISLAV) + VEN (from VENDER).
     Everything else stays present but dim. Cyan / electric white,
     wide monospace face, faint scan-line grid, drifting dust.
     ============================================================ */

  :root {
    --bg:        #03060a;          /* near-black void                 */
    --dim:       #2c4250;          /* unlit letters (present, faint)  */
    --lit:       #d8fbff;          /* ignited letter core             */
    --cyan:      #46f0ff;          /* electric accent / beam          */
    --cyan-soft: rgba(70,240,255,.55);
    --grid:      rgba(70,240,255,.045);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--dim);
    font-family: "SFMono-Regular", "SF Mono", ui-monospace, Menlo,
                 Consolas, "Liberation Mono", "Courier New", monospace;
    overflow: hidden;
    min-height: 100svh;
    display: grid;
    place-items: center;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Faint scan-line grid lying over the void --------------- */
  .grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg,  var(--grid) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, var(--grid) 0 1px, transparent 1px 60px);
    opacity: 0;
    animation: gridIn 1.4s ease 0.4s forwards;   /* fades up after the hold */
    will-change: opacity;
  }
  @keyframes gridIn { to { opacity: 1; } }

  /* Vignette deepens the darkness around the edges */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(120% 120% at 50% 50%,
                transparent 40%, rgba(0,0,0,.55) 100%);
  }

  /* ---- Drifting dust (canvas) -------------------------------- */
  canvas#dust {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    animation: gridIn 2.2s ease 1s forwards;
  }

  /* ---- The scanning beam — a razor-thin vertical line --------- */
  .beam {
    position: fixed;
    top: 0;
    left: 0;
    width: 2px;
    height: 100%;
    z-index: 4;
    pointer-events: none;
    /* white-hot core wrapped in a cyan halo */
    background: linear-gradient(to right,
      transparent, var(--cyan) 42%, #ffffff 50%, var(--cyan) 58%, transparent);
    box-shadow: 0 0 14px 3px var(--cyan-soft),
                0 0 60px 10px rgba(70,240,255,.22);
    opacity: 0;
    transform: translateX(-5vw);   /* parked just off the left edge */
    will-change: transform, opacity;
  }

  /* ---- Stage + name ------------------------------------------- */
  .stage {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 6vmin;
    max-width: 96vw;
  }

  h1 {
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: clamp(.04em, 1.2vw, .18em);   /* wide techy face   */
    font-size: clamp(1.7rem, 8.5vw, 6.2rem);      /* fluid type        */
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(.45em, 3vw, 1.1em);                /* space BETWEEN words */
    /* The dim name fades up AFTER the beam arrives (choreographed
       in JS). Begins invisible; .name-in eases it to dim presence. */
    opacity: 0;
    transition: opacity 1s ease;
  }
  h1.name-in { opacity: 1; }

  /* Each word is an unbreakable unit so VRA / VEN never split */
  .word { display: inline-flex; white-space: nowrap; }

  /* Every letter is an individually-controllable glyph.
     A ::after layer carries the glow so the *continuous* resting
     breath can animate opacity ONLY (spec: transform/opacity/filter
     — never a sustained text-shadow repaint). */
  .ltr {
    display: inline-block;
    position: relative;
    color: var(--dim);
    /* one-shot ignition: a single short color fade (not a sustained
       60fps loop) — deliberately kept as the "charge" tell. */
    transition: color .45s ease;
    will-change: color;
  }
  /* Glow layer — a duplicated glyph stacked exactly on top, holding
     the bloom via text-shadow. Hidden until ignition; its OPACITY is
     what breathes at rest, so the loop is GPU-cheap and on-spec. */
  .ltr::after {
    content: attr(data-ch);
    position: absolute;
    left: 0; top: 0;
    color: var(--lit);
    opacity: 0;
    text-shadow:
      0 0 6px  #fff,
      0 0 16px var(--cyan),
      0 0 34px var(--cyan-soft),
      0 0 70px rgba(70,240,255,.45);
    transition: opacity .45s ease;
    pointer-events: none;
  }

  /* Lit state — core brightens, glow layer blooms in. */
  .ltr.lit { color: var(--lit); }
  .ltr.lit::after { opacity: 1; }

  /* Very slow resting breath — animates OPACITY of the glow layer
     only (compositor-friendly; no layout, no text-shadow churn). */
  .ltr.lit.rest::after { animation: breathe 4.5s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { opacity: .82; }
    50%      { opacity: 1;   }
  }

  /* ---- Contact line, revealed last ---------------------------- */
  .contact {
    margin-top: clamp(1.6rem, 5vh, 3.2rem);
    font-size: clamp(.7rem, 1.9vw, .95rem);
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: clamp(.6rem, 4vw, 2rem);
    opacity: 0;                       /* revealed by JS, last */
    transition: opacity 1s ease;
  }
  .contact a {
    color: #8fd9e6;
    text-decoration: none;
    position: relative;
    transition: color .3s ease, text-shadow .3s ease;
  }
  .contact a::after {
    content: "";
    position: absolute;
    left: 0; bottom: -4px;
    width: 100%; height: 1px;
    background: var(--cyan-soft);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .35s ease;
  }
  .contact a:hover,
  .contact a:focus-visible { color: var(--lit); text-shadow: 0 0 10px var(--cyan-soft); }
  .contact a:hover::after,
  .contact a:focus-visible::after { transform: scaleX(1); }
  .contact a:focus-visible { outline: 1px solid var(--cyan-soft); outline-offset: 4px; }
  .contact .sep { opacity: .4; }

  /* ---- Replay control ----------------------------------------- */
  .replay {
    position: fixed;
    right: clamp(1rem, 3vw, 2rem);
    bottom: clamp(1rem, 3vw, 2rem);
    z-index: 6;
    background: transparent;
    border: 1px solid rgba(70,240,255,.3);
    color: #8fd9e6;
    font: inherit;
    font-size: .62rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    padding: .55em .9em;
    cursor: pointer;
    opacity: 0;
    transition: opacity .8s ease, border-color .3s, color .3s, box-shadow .3s;
  }
  .replay:hover,
  .replay:focus-visible {
    color: var(--lit);
    border-color: var(--cyan);
    box-shadow: 0 0 16px rgba(70,240,255,.3);
    outline: none;
  }

  /* Visually-hidden helper. The visible H1 is already real,
     selectable text with an aria-label, so this is belt-and-
     suspenders for full-name recoverability. */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* ============================================================
     REDUCED MOTION — jump straight to the final resting state.
     No sweep, no dust loop, no breath; everything simply present.
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .grid, canvas#dust { animation: none; opacity: 1; }
    .beam { display: none; }
    h1 { opacity: 1 !important; transition: none; }
    .ltr, .ltr::after { transition: none; }
    .ltr.lit.rest::after { animation: none; }
    .contact, .replay { opacity: 1 !important; transition: none; }
  }
</style>
</head>
<body>

  <!-- Background layers (decorative, hidden from a11y tree) -->
  <div class="grid" aria-hidden="true"></div>
  <canvas id="dust" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="beam" id="beam" aria-hidden="true"></div>

  <main class="stage">
    <!-- Full name as real, selectable text. Screen readers get the
         clean name via aria-label; sighted users see per-letter
         glyphs. Words are unbreakable units (VRA / VEN never split).
         An aria-hidden space between the words keeps copy-paste of
         the visible glyphs clean ("VRASTISLAV VENDER"). -->
    <h1 aria-label="Vrastislav Vender">
      <span class="word" id="word1" aria-hidden="true"></span>
      <span class="sr-space" aria-hidden="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"> </span>
      <span class="word" id="word2" aria-hidden="true"></span>
    </h1>

    <!-- Contact, revealed last -->
    <p class="contact" id="contact">
      <a href="mailto:hello@vraven.com">hello@vraven.com</a>
      <span class="sep" aria-hidden="true">/</span>
      <a href="tel:+420123456789">+420&nbsp;123&nbsp;456&nbsp;789</a>
    </p>
  </main>

  <button class="replay" id="replay" type="button">Replay</button>

  <script>
  (function () {
    "use strict";

    /* ----------------------------------------------------------
       1. Build the name letter-by-letter.
       Each word carries how many LEADING letters are "lit".
       VRASTISLAV -> lit V,R,A (idx 0,1,2); dim S,T,I,S,L,A,V
       VENDER     -> lit V,E,N (idx 0,1,2); dim D,E,R
       Lit letters left-to-right spell  V R A V E N.
       ---------------------------------------------------------- */
    var WORDS = [
      { id: "word1", text: "VRASTISLAV", litCount: 3 },
      { id: "word2", text: "VENDER",     litCount: 3 }
    ];

    var letters = [];                       // flat list of {el, lit}

    WORDS.forEach(function (w) {
      var host = document.getElementById(w.id);
      for (var i = 0; i < w.text.length; i++) {
        var span = document.createElement("span");
        span.className = "ltr";
        span.textContent = w.text[i];
        // mirror the glyph into the glow ::after layer
        span.setAttribute("data-ch", w.text[i]);
        var isLit = i < w.litCount;
        span.dataset.lit = isLit ? "1" : "0";
        host.appendChild(span);
        letters.push({ el: span, lit: isLit });
      }
    });

    var litLetters = letters.filter(function (l) { return l.lit; });

    var nameEl  = document.querySelector("h1");
    var beam    = document.getElementById("beam");
    var contact = document.getElementById("contact");
    var replay  = document.getElementById("replay");

    var prefersReduced = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ----------------------------------------------------------
       2. Timing controllers so a replay can cleanly cancel.
       ---------------------------------------------------------- */
    var timers = [];
    var beamRAF = null;
    function clearTimers() {
      timers.forEach(clearTimeout);
      timers = [];
      if (beamRAF) { cancelAnimationFrame(beamRAF); beamRAF = null; }
    }
    function later(fn, ms) { timers.push(setTimeout(fn, ms)); }

    /* Snap to the final resting state (reduced motion / safety). */
    function showResting() {
      nameEl.classList.add("name-in");
      letters.forEach(function (l) {
        l.el.classList.toggle("lit", l.lit);
        if (l.lit) l.el.classList.add("rest");
      });
      beam.style.opacity = "0";
      contact.style.opacity = "1";
      replay.style.opacity = "1";
    }

    /* ----------------------------------------------------------
       3. The choreography.
       black hold -> beam arrives from the dark -> dim name FADES IN
       -> scan sweeps L->R igniting VRAVEN as it crosses each letter
       -> beam settles to soft, lit letters breathe -> contact last.
       ---------------------------------------------------------- */
    function play() {
      clearTimers();

      // reset to a clean black slate
      nameEl.classList.remove("name-in");
      letters.forEach(function (l) { l.el.classList.remove("lit", "rest"); });
      contact.style.opacity = "0";
      replay.style.opacity  = "0";
      beam.style.opacity    = "0";
      beam.style.transition = "none";
      beam.style.transform  = "translateX(-5vw)";

      if (prefersReduced) { showResting(); return; }

      // 1) hold on black, then bring the beam up at the far left
      later(function () {
        beam.style.transition = "opacity .5s ease";
        beam.style.opacity = "1";
      }, 600);

      // 2) the dim name fades into presence just after the beam arrives
      //    (opacity-only fade — does not shift layout, so the
      //    getBoundingClientRect measured at sweep start stays valid).
      later(function () { nameEl.classList.add("name-in"); }, 850);

      var SWEEP_START = 1400;   // ms before the sweep begins (name is up by now)
      var SWEEP_DUR   = 2200;   // ms for the line to cross the screen

      // 3) Measure each lit letter's screen X right before the sweep,
      //    then fire ignition exactly as the beam crosses it.
      later(function () {
        var vw = window.innerWidth;
        var targets = litLetters.map(function (l) {
          var r = l.el.getBoundingClientRect();
          return { el: l.el, x: r.left + r.width / 2 };
        });

        var startX = -0.05 * vw;             // matches translateX(-5vw)
        var endX   =  1.05 * vw;
        var span   = endX - startX;
        var t0 = performance.now();

        function frame(now) {
          var p = (now - t0) / SWEEP_DUR;    // 0..1 progress
          if (p > 1) p = 1;
          // easeInOutCubic for a weighty, machined sweep
          var e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;
          var x = startX + span * e;
          beam.style.transform = "translateX(" + x + "px)";

          // ignite any lit letter the beam has now passed
          for (var i = 0; i < targets.length; i++) {
            var t = targets[i];
            if (t && x >= t.x) {
              t.el.classList.add("lit");
              targets[i] = null;             // fire once
            }
          }
          if (p < 1) { beamRAF = requestAnimationFrame(frame); }
          else { beamRAF = null; }
        }
        beamRAF = requestAnimationFrame(frame);
      }, SWEEP_START);

      // 4) settle: the beam glides back to centre and dims to a faint
      //    resting line (spec: "resting state WITH soft beam"); lit
      //    letters take up their slow breath.
      later(function () {
        var mid = 0.5 * window.innerWidth;   // park behind the name
        beam.style.transition = "transform 1.1s ease, opacity 1.1s ease";
        beam.style.transform = "translateX(" + mid + "px)";
        beam.style.opacity = "0.14";         // present but soft
        litLetters.forEach(function (l) { l.el.classList.add("rest"); });
      }, SWEEP_START + SWEEP_DUR + 200);

      // 5) contact + replay fade in last
      later(function () {
        contact.style.opacity = "1";
        replay.style.opacity  = "1";
      }, SWEEP_START + SWEEP_DUR + 700);
    }

    /* ----------------------------------------------------------
       4. Dust — slow drifting motes on canvas via rAF.
       Skipped entirely under reduced motion. Pauses when hidden.
       ---------------------------------------------------------- */
    function startDust() {
      if (prefersReduced) return;
      var c = document.getElementById("dust");
      var ctx = c.getContext("2d");
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var motes = [];
      var W, H, raf = null;

      function resize() {
        W = c.width  = Math.floor(innerWidth  * dpr);
        H = c.height = Math.floor(innerHeight * dpr);
        c.style.width  = innerWidth + "px";
        c.style.height = innerHeight + "px";
      }
      resize();
      window.addEventListener("resize", resize);

      var count = Math.min(70, Math.floor(innerWidth / 14));
      for (var i = 0; i < count; i++) {
        motes.push({
          x: Math.random() * innerWidth  * dpr,
          y: Math.random() * innerHeight * dpr,
          r: (Math.random() * 1.3 + 0.3) * dpr,
          vx: (Math.random() - 0.5) * 0.12 * dpr,
          vy: (Math.random() - 0.5) * 0.12 * dpr,
          a: Math.random() * 0.4 + 0.1
        });
      }

      function tick() {
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < motes.length; i++) {
          var m = motes[i];
          m.x += m.vx; m.y += m.vy;
          if (m.x < 0) m.x = W; else if (m.x > W) m.x = 0;
          if (m.y < 0) m.y = H; else if (m.y > H) m.y = 0;
          ctx.beginPath();
          ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(140,225,240," + m.a + ")";
          ctx.fill();
        }
        raf = requestAnimationFrame(tick);
      }
      tick();

      // Pause the loop when the tab is hidden (battery-friendly).
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) { if (raf) { cancelAnimationFrame(raf); raf = null; } }
        else if (raf === null) { raf = requestAnimationFrame(tick); }
      });
    }

    /* ----------------------------------------------------------
       5. Interaction + kick-off.
       ---------------------------------------------------------- */
    replay.addEventListener("click", function (e) {
      e.stopPropagation();
      play();
    });

    // Click / tap anywhere (except links + the replay button) replays.
    document.addEventListener("click", function (e) {
      if (e.target.closest("a") || e.target.closest("#replay")) return;
      var sel = window.getSelection();          // don't fight a selection
      if (sel && sel.toString().length) return;
      play();
    });
    // Keyboard: Enter / Space replays when not focused on a control.
    document.addEventListener("keydown", function (e) {
      if ((e.key === "Enter" || e.key === " ") &&
          e.target.tagName !== "BUTTON" && !e.target.closest("a")) {
        e.preventDefault();
        play();
      }
    });

    startDust();
    play();
  })();
  </script>
</body>
</html>
