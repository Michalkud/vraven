<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vrastislav Vender — VRAVEN</title>
<meta name="description" content="VRAVEN — Vrastislav Vender. A name brought into the light." />

<!-- Pre-paint: mark JS on, and (unless reduced-motion) arm the intro BEFORE
     first paint so the wordmark never flashes its final state. -->
<script>
  (function () {
    var d = document.documentElement;
    d.classList.remove('no-js');
    try {
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) d.classList.add('reduce');
      else d.classList.add('intro');
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,600,700&f[]=satoshi@400,500,700&display=swap" />
<link rel="stylesheet" href="assets/tokens.css" />

<style>
  /* Deliverable A — abstract / minimal: just the lit name, one line, contact. */
  .hero-content { display: flex; flex-direction: column; align-items: center; gap: clamp(1.6rem, 4vh, 2.8rem); }
  .lede {
    font-family: var(--font-text);
    font-size: var(--step-1); line-height: 1.4; color: var(--ink);
    max-width: 26ch; text-align: center; font-weight: 400;
  }
  .lede .accent { color: var(--gold); }
  .hero-contact {
    position: absolute; left: 0; right: 0; bottom: clamp(4.5rem, 12vh, 6.5rem);
    z-index: 5; display: flex; justify-content: center; gap: clamp(1rem, 4vw, 2.6rem);
    font-size: var(--step-0); letter-spacing: 0.06em; color: var(--ink);
  }
  .hero-contact a { color: var(--ink); border-bottom: 1px solid rgba(var(--rgb-gold), .3); padding-bottom: 2px; transition: color .25s, border-color .25s; }
  .hero-contact a:hover, .hero-contact a:focus-visible { color: var(--hot); border-color: rgba(var(--rgb-gold), .85); outline: none; }
  .hero-contact .sep { color: rgba(var(--rgb-gold), .35); }
</style>
</head>
<body>
  <main>
    <section class="hero" id="hero">
      <canvas class="hero-gl" aria-hidden="true"></canvas>

      <!-- CSS beam, shown only when WebGL is unavailable / reduced motion -->
      <div class="hero-fallback" aria-hidden="true">
        <div class="fb-atmos"></div><div class="fb-rays"></div><div class="fb-pool"></div>
      </div>

      <div class="hero-vignette" aria-hidden="true"></div>

      <div class="hero-content">
        <h1 class="wordmark" aria-label="Vrastislav Vender">
          <span class="word" aria-hidden="true"><span class="lit"><span class="l i1">V</span><span class="l i2">R</span><span class="l i3">A</span></span><span class="dim">STISLAV</span></span>
          <span class="word" aria-hidden="true"><span class="lit"><span class="l i4">V</span><span class="l i5">E</span><span class="l i6">N</span></span><span class="dim">DER</span></span>
        </h1>
        <p class="lede">Out of the dark, a name takes the light.</p>
      </div>

      <nav class="hero-contact" aria-label="Contact">
        <a href="mailto:hello@vraven.com">hello@vraven.com</a>
        <span class="sep" aria-hidden="true">·</span>
        <a href="tel:+420123456789">+420&nbsp;123&nbsp;456&nbsp;789</a>
      </nav>

      <div class="grain" aria-hidden="true"></div>

      <nav class="hero-controls" aria-label="Animation controls">
        <button type="button" onclick="window.VRAVEN&&VRAVEN.hero.skip()">Skip</button>
        <button type="button" onclick="window.VRAVEN&&VRAVEN.hero.replay()">Replay</button>
      </nav>
    </section>
  </main>

  <script src="assets/hero.js" defer></script>
</body>
</html>
